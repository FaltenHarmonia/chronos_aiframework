training_data_paths:
- "./data/processed/chronos_debug_tsmixup_900.arrow"
- "./data/processed/chronos_debug_kernel_synth_100.arrow"
probability:
- 0.9
- 0.1
dataset_name: autogluon/chronos_datasets
data_level: debug
context_length: 128
prediction_length: 16
min_past: 128
max_steps: 100
save_steps: 100
log_steps: 10
per_device_train_batch_size: 4
learning_rate: 0.001
optim: adamw_torch
num_samples: 20
shuffle_buffer_length: 200
gradient_accumulation_steps: 4
model_id: google/t5-efficient-tiny
model_type: seq2seq
random_init: true
tie_embeddings: true
output_dir: ./outputs/checkpoints/debug_tiny
tf32: false
torch_compile: false
tokenizer_class: MeanScaleUniformBins
tokenizer_kwargs:
  low_limit: -15.0
  high_limit: 15.0
n_tokens: 4096
n_special_tokens: 2
lr_scheduler_type: linear
warmup_ratio: 0.1
dataloader_num_workers: 1
max_missing_prop: 0.9
use_eos_token: true
