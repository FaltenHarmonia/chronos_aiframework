training_data_paths:
- "./data/local-benchmark/synthetic.arrow"
probability:
- 1.0
context_length: 64
prediction_length: 16
min_past: 64
max_steps: 20
save_steps: 20
log_steps: 5
per_device_train_batch_size: 4
learning_rate: 0.001
optim: adamw_torch
num_samples: 4
shuffle_buffer_length: 64
gradient_accumulation_steps: 1
model_id: ./test/local-t5-debug-config
model_type: seq2seq
random_init: true
tie_embeddings: true
output_dir: ./outputs/local-benchmark/t5-debug
tf32: false
torch_compile: false
tokenizer_class: MeanScaleUniformBins
tokenizer_kwargs:
  low_limit: -15.0
  high_limit: 15.0
n_tokens: 4096
n_special_tokens: 2
lr_scheduler_type: linear
warmup_ratio: 0.0
dataloader_num_workers: 0
max_missing_prop: 0.9
use_eos_token: true
