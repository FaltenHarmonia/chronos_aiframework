training_data_paths:
- "./data/local-smoke/synthetic.arrow"
probability:
- 1.0
context_length: 32
prediction_length: 8
min_past: 32
max_steps: 2
save_steps: 1
log_steps: 1
per_device_train_batch_size: 2
learning_rate: 0.001
optim: adamw_torch
num_samples: 2
shuffle_buffer_length: 8
gradient_accumulation_steps: 1
model_id: ./test/dummy-chronos-model
model_type: seq2seq
random_init: true
tie_embeddings: true
output_dir: ./outputs/local-smoke
tf32: false
torch_compile: false
tokenizer_class: MeanScaleUniformBins
tokenizer_kwargs:
  low_limit: -15.0
  high_limit: 15.0
n_tokens: 64
n_special_tokens: 2
lr_scheduler_type: linear
warmup_ratio: 0.0
dataloader_num_workers: 0
max_missing_prop: 0.9
use_eos_token: true
